<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>42nd QRF Battalion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="landing-page">
    <div class="landing-overlay"></div>
    <div class="scanlines"></div>

    <div class="landing-content">
        <div class="unit-emblem">
            <img src="42nd_Logo.png" alt="42nd QRF Battalion Logo" class="emblem-logo">
        </div>

        <h1 class="landing-title">
            <span class="title-prefix">THE</span>
            <span class="title-main">42<sup>ND</sup> QRF</span>
            <span class="title-suffix">BATTALION</span>
        </h1>

        <div class="landing-divider">
            <span class="divider-diamond"></span>
        </div>

        <p class="landing-motto">"Quick to React, First to Fight"</p>

        <p class="landing-tagline">An Arma 3 Milsim Community</p>

        <a href="Main_Page.html" class="enter-btn">
            <span class="enter-btn-text">ENTER SITE</span>
            <span class="enter-btn-arrow">&raquo;</span>
        </a>

        <div class="landing-status">
            <span class="status-dot"></span>
            UNIT ACTIVE &mdash; RECRUITING OPEN
        </div>
    </div>

    <div class="landing-footer">
        <p>&copy; 2026 42nd QRF Battalion &mdash; All Rights Reserved</p>
    </div>
</body>
</html>
